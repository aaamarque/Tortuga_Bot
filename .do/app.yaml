# DigitalOcean App Platform - Tortuga Bot
# 1. Push this repo to GitHub, then connect it in the DigitalOcean control panel
# 2. Or: doctl apps create --spec .do/app.yaml (set github.repo first)
# 3. Ensure oil_spill_model.keras and tortuga.keras are in backend/ before deploy

name: tortuga-bot
region: nyc

ingress:
  rules:
    - component:
        name: backend
        preserve_path_prefix: true
      match:
        path:
          prefix: /health
    - component:
        name: backend
        preserve_path_prefix: true
      match:
        path:
          prefix: /predict-turtle
    - component:
        name: backend
        preserve_path_prefix: true
      match:
        path:
          prefix: /predict
    - component:
        name: frontend
      match:
        path:
          prefix: /

services:
  # FastAPI backend (TensorFlow/Keras, Oil Spill + Turtle models)
  - name: backend
    github:
      repo: aaamarque/Tortuga_Bot
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /health
      initial_delay_seconds: 60

  # Next.js frontend (proxies /api/* to backend)
  - name: frontend
    github:
      repo: aaamarque/Tortuga_Bot
      branch: main
      deploy_on_push: true
    source_dir: oil_webappd
    dockerfile_path: oil_webappd/Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: BACKEND_URL
        value: ${backend.PUBLIC_URL}/predict
        type: GENERAL
        scope: RUN_TIME
